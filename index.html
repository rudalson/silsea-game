<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실세아와 구운 감자의 대모험</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100vw;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
      box-shadow: 0 0 60px rgba(100, 50, 255, 0.5),
                  0 0 120px rgba(50, 100, 255, 0.3);
      border-radius: 4px;
      border: 2px solid rgba(150, 100, 255, 0.4);
    }
  </style>
</head>
<body>
<div id="game-container"></div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<script>
// ============================================================
// 실세아와 구운 감자의 대모험
// A complete Phaser 3 2D side-scrolling platformer
// ============================================================

// ----- CONSTANTS -----
const WORLD_WIDTH  = 3200;
const WORLD_HEIGHT = 600;
const GAME_W = 800;
const GAME_H = 600;

// Player state IDs
const STATE = { NORMAL: 0, UNICORN: 1, PEGASUS: 2, ALICORN: 3 };

// Player state colours
const STATE_COLOR = {
  [STATE.NORMAL]:  0xffffff,
  [STATE.UNICORN]: 0x4488ff,
  [STATE.PEGASUS]: 0x00ffff,
  [STATE.ALICORN]: 0xffd700,
};

// ============================================================
// HELPER – draw & bake a texture via Graphics
// ============================================================
function makeTexture(scene, key, w, h, fn) {
  const g = scene.make.graphics({ x: 0, y: 0, add: false });
  fn(g, w, h);
  g.generateTexture(key, w, h);
  g.destroy();
}

// ============================================================
// BOOT SCENE – generate all textures
// ============================================================
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }

  preload() {
    this.load.image('silsea_sprite_raw', 'assets/silsea_sprite.jpg');
    this.load.audio('basic_bgm', 'assets/Sounds/basic_bgm.mp3');
    
    // Load Kenney spritesheets (XML format)!
    this.load.atlasXML('tiles', 'assets/Spritesheets/spritesheet-tiles-default.png', 'assets/Spritesheets/spritesheet-tiles-default.xml');
    this.load.atlasXML('enemies', 'assets/Spritesheets/spritesheet-enemies-default.png', 'assets/Spritesheets/spritesheet-enemies-default.xml');
    
    // Load SFX files!
    this.load.audio('sfx_jump', 'assets/Sounds/sfx_jump.ogg');
    this.load.audio('sfx_magic', 'assets/Sounds/sfx_magic.ogg');
    this.load.audio('sfx_coin', 'assets/Sounds/sfx_coin.ogg');
    this.load.audio('sfx_bump', 'assets/Sounds/sfx_bump.ogg');
    this.load.audio('sfx_hurt', 'assets/Sounds/sfx_hurt.ogg');
    this.load.audio('sfx_disappear', 'assets/Sounds/sfx_disappear.ogg');
    this.load.audio('sfx_gem', 'assets/Sounds/sfx_gem.ogg');
    this.load.audio('sfx_throw', 'assets/Sounds/sfx_throw.ogg');
  }

  create() {
    // ---- background sky gradient ----
    makeTexture(this, 'bg', GAME_W, GAME_H, (g) => {
      for (let y = 0; y < GAME_H; y++) {
        const t = y / GAME_H;
        const r = Phaser.Display.Color.Interpolate.ColorWithColor(
          { r: 30, g: 20, b: 80 }, { r: 120, g: 200, b: 255 }, 100, t * 100
        );
        g.fillStyle(Phaser.Display.Color.GetColor(r.r, r.g, r.b), 1);
        g.fillRect(0, y, GAME_W, 1);
      }
    });

    // ---- Process the sprite sheet raw image to clean background ----
    const img = this.textures.get('silsea_sprite_raw').getSourceImage();
    const canvas = document.createElement('canvas');
    canvas.width = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);

    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imgData.data;

    // Process pixels to remove grey checkerboard background
    for (let i = 0; i < data.length; i += 4) {
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];

      const diffRG = Math.abs(r - g);
      const diffGB = Math.abs(g - b);
      const diffRB = Math.abs(r - b);

      // Precise color ranges of the background checkerboard squares in JPEG (with compression chroma noise)
      const isBgColor1 = (r >= 200 && r <= 228) && (g >= 208 && g <= 234) && (b >= 215 && b <= 242);
      const isBgColor2 = (r >= 175 && r <= 198) && (g >= 182 && g <= 206) && (b >= 188 && b <= 212);
      
      // Generic checkerboard match for borders/transitional compression noise
      const isGrey = diffRG < 16 && diffGB < 16 && diffRB < 18;
      const isBgRange = r >= 165 && r <= 232;

      if (isBgColor1 || isBgColor2 || (isGrey && isBgRange)) {
        data[i + 3] = 0; // Transparent
      }
    }
    ctx.putImageData(imgData, 0, 0);

    // Add cleaned texture
    this.textures.addCanvas('silsea_sprite_clean', canvas);

    // Add frames manually to avoid labels and preserve perfect proportions (Uniform 128x136)
    const texture = this.textures.get('silsea_sprite_clean');
    
    // RUN: Row 1, cols 0..7. y: 52..188 (h: 136)
    for (let i = 0; i < 8; i++) {
      texture.add('run_' + i, 0, i * 128, 52, 128, 136);
    }
    // IDLE: Row 2, cols 0..4. y: 214..350 (h: 136)
    for (let i = 0; i < 5; i++) {
      texture.add('idle_' + i, 0, i * 128, 214, 128, 136);
    }
    // JUMP: Row 2, cols 5..7. y: 214..350 (h: 136)
    for (let i = 0; i < 3; i++) {
      texture.add('jump_' + i, 0, (5 + i) * 128, 214, 128, 136);
    }
    // WALK: Row 3, cols 0..5. y: 396..532 (h: 136)
    for (let i = 0; i < 6; i++) {
      texture.add('walk_' + i, 0, i * 128, 396, 128, 136);
    }

    // Create Animations
    this.anims.create({
      key: 'run',
      frames: [
        { key: 'silsea_sprite_clean', frame: 'run_0' },
        { key: 'silsea_sprite_clean', frame: 'run_1' },
        { key: 'silsea_sprite_clean', frame: 'run_2' },
        { key: 'silsea_sprite_clean', frame: 'run_3' },
        { key: 'silsea_sprite_clean', frame: 'run_4' },
        { key: 'silsea_sprite_clean', frame: 'run_5' },
        { key: 'silsea_sprite_clean', frame: 'run_6' },
        { key: 'silsea_sprite_clean', frame: 'run_7' }
      ],
      frameRate: 12,
      repeat: -1
    });

    this.anims.create({
      key: 'idle',
      frames: [
        { key: 'silsea_sprite_clean', frame: 'idle_0' },
        { key: 'silsea_sprite_clean', frame: 'idle_1' },
        { key: 'silsea_sprite_clean', frame: 'idle_2' },
        { key: 'silsea_sprite_clean', frame: 'idle_3' },
        { key: 'silsea_sprite_clean', frame: 'idle_4' }
      ],
      frameRate: 6,
      repeat: -1
    });

    this.anims.create({
      key: 'jump',
      frames: [
        { key: 'silsea_sprite_clean', frame: 'jump_0' },
        { key: 'silsea_sprite_clean', frame: 'jump_1' },
        { key: 'silsea_sprite_clean', frame: 'jump_2' }
      ],
      frameRate: 6,
      repeat: 0
    });

    this.anims.create({
      key: 'walk',
      frames: [
        { key: 'silsea_sprite_clean', frame: 'walk_0' },
        { key: 'silsea_sprite_clean', frame: 'walk_1' },
        { key: 'silsea_sprite_clean', frame: 'walk_2' },
        { key: 'silsea_sprite_clean', frame: 'walk_3' },
        { key: 'silsea_sprite_clean', frame: 'walk_4' },
        { key: 'silsea_sprite_clean', frame: 'walk_5' }
      ],
      frameRate: 8,
      repeat: -1
    });

    // Create Animations for Enemies
    this.anims.create({
      key: 'snail_walk',
      frames: [
        { key: 'enemies', frame: 'snail_walk_a' },
        { key: 'enemies', frame: 'snail_walk_b' }
      ],
      frameRate: 6,
      repeat: -1
    });

    this.anims.create({
      key: 'bee_fly',
      frames: [
        { key: 'enemies', frame: 'bee_a' },
        { key: 'enemies', frame: 'bee_b' }
      ],
      frameRate: 8,
      repeat: -1
    });

    this.anims.create({
      key: 'boss_walk',
      frames: [
        { key: 'enemies', frame: 'slime_block_walk_a' },
        { key: 'enemies', frame: 'slime_block_walk_b' }
      ],
      frameRate: 4,
      repeat: -1
    });

    // Keep procedural player textures just in case
    this._makePlayer('player_normal',  STATE.NORMAL);
    this._makePlayer('player_unicorn', STATE.UNICORN);
    this._makePlayer('player_pegasus', STATE.PEGASUS);
    this._makePlayer('player_alicorn', STATE.ALICORN);

    // ---- magnet effect ring ----
    makeTexture(this, 'magnet_ring', 400, 400, (g) => {
      g.lineStyle(2, 0x4488ff, 0.2);
      g.strokeCircle(200, 200, 200);
    });

    this.scene.start('Game');
  }

  _makePlayer(key, state) {
    const col = STATE_COLOR[state];
    makeTexture(this, key, 28, 36, (g) => {
      // body
      g.fillStyle(col);
      g.fillRect(4, 10, 20, 20);
      // head
      g.fillStyle(col);
      g.fillCircle(14, 9, 10);
      // face
      g.fillStyle(0x000000);
      g.fillCircle(10, 7, 2);
      g.fillCircle(18, 7, 2);
      g.fillStyle(0xff6688);
      g.fillEllipse(14, 12, 8, 4);
      // legs
      g.fillStyle(col === 0xffffff ? 0xdddddd : Phaser.Display.Color.ValueToColor(col).darken(20).color);
      g.fillRect(4, 30, 8, 6);
      g.fillRect(16, 30, 8, 6);

      // State-specific decorations
      if (state === STATE.UNICORN) {
        // Horn
        g.fillStyle(0xaaccff);
        g.fillTriangle(14, -4, 10, 8, 18, 8);
        g.lineStyle(1, 0x4488ff);
        g.strokeTriangle(14, -4, 10, 8, 18, 8);
      }
      if (state === STATE.PEGASUS) {
        // Wings
        g.fillStyle(0x00eeee);
        g.fillEllipse(-6, 18, 18, 10);
        g.fillEllipse(34, 18, 18, 10);
      }
      if (state === STATE.ALICORN) {
        // Horn + Wings + glow outline
        g.fillStyle(0xffd700);
        g.fillTriangle(14, -5, 10, 8, 18, 8);
        g.lineStyle(2, 0xff8800);
        g.strokeTriangle(14, -5, 10, 8, 18, 8);
        g.fillStyle(0xffaa00, 0.7);
        g.fillEllipse(-8, 18, 22, 12);
        g.fillEllipse(36, 18, 22, 12);
        // Glow aura
        g.lineStyle(3, 0xffd700, 0.5);
        g.strokeCircle(14, 18, 20);
      }
    });
  }
}

// ============================================================
// GAME SCENE
// ============================================================
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  // ----------------------------------------------------------
  init() {
    this.score        = 0;       // stored as integer percentage
    this.playerHP     = 3;
    this.playerState  = STATE.NORMAL;
    this.flightGauge  = 8;       // seconds remaining
    this.isFlying     = false;
    this.isStunned    = false;
    this.isInvincible = false;   // brief invincibility after damage
    this.gameOver     = false;
    this.gameWon      = false;
    this.bossSpawned  = false;
    this.bossHP       = 3;
    this.bossPhase    = 'idle'; // idle | quake | shoot
    this.bossTimer    = 0;
  }

  // ----------------------------------------------------------
  create() {
    // ---- scrolling BG ----
    this.add.tileSprite(0, 0, WORLD_WIDTH, GAME_H, 'bg').setOrigin(0, 0).setScrollFactor(0.3);

    // ---- physics world ----
    this.physics.world.setBounds(0, 0, WORLD_WIDTH, GAME_H + 200);

    // ---- groups ----
    this.platforms     = this.physics.add.staticGroup();
    this.starBoxes     = this.physics.add.staticGroup();
    this.stars         = this.physics.add.group({ allowGravity: true });
    this.items         = this.physics.add.group({ allowGravity: true });
    this.enemies       = this.physics.add.group({ allowGravity: true });
    this.pumpkins      = this.physics.add.staticGroup();
    this.clouds        = this.physics.add.group({ allowGravity: false });
    this.lightnings    = this.physics.add.group({ allowGravity: true });
    this.magpies       = this.physics.add.group({ allowGravity: true });
    this.bossProjs     = this.physics.add.group({ allowGravity: false });

    // ---- build level ----
    this._buildLevel();

    // ---- player ----
    this.player = this.physics.add.sprite(80, 400, 'silsea_sprite_clean', 'idle_0');
    this.player.setScale(0.5);
    this.player.setCollideWorldBounds(true);
    this.player.body.setSize(80, 115);
    this.player.body.setOffset(24, 12);

    // ---- camera ----
    this.cameras.main.setBounds(0, 0, WORLD_WIDTH, GAME_H);
    this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

    // ---- colliders ----
    this.physics.add.collider(this.player, this.platforms);
    this.physics.add.collider(this.enemies, this.platforms);
    this.physics.add.collider(this.stars,   this.platforms);
    this.physics.add.collider(this.items,   this.platforms);
    this.physics.add.collider(this.magpies, this.platforms);
    this.physics.add.collider(this.lightnings, this.platforms, (l) => l.destroy());

    // --- StarBox hit from below ---
    this.physics.add.collider(this.player, this.starBoxes, this._hitStarBox, null, this);

    // ---- overlaps ----
    this.physics.add.overlap(this.player, this.stars,      this._collectStar,    null, this);
    this.physics.add.overlap(this.player, this.items,      this._collectItem,    null, this);
    this.physics.add.overlap(this.player, this.enemies,    this._hitEnemy,       null, this);
    this.physics.add.overlap(this.player, this.pumpkins,   this._hitPumpkin,     null, this);
    this.physics.add.overlap(this.player, this.lightnings, this._hitLightning,   null, this);
    this.physics.add.overlap(this.player, this.magpies,    this._hitMagpie,      null, this);
    this.physics.add.overlap(this.player, this.bossProjs,  this._hitBossProj,    null, this);

    // ---- input ----
    this.cursors = this.input.keyboard.createCursorKeys();
    this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    // ---- HUD (fixed to camera) ----
    this._buildHUD();

    // ---- spawn clouds & magpies periodically ----
    this.time.addEvent({ delay: 5000, callback: this._spawnCloud,  callbackScope: this, loop: true });
    this.time.addEvent({ delay: 8000, callback: this._spawnMagpie, callbackScope: this, loop: true });
    // Initial clouds
    for (let i = 0; i < 5; i++) this._spawnCloud();

    // ---- play BGM ----
    if (this.sound.get('basic_bgm')) {
      this.bgm = this.sound.get('basic_bgm');
      if (!this.bgm.isPlaying) {
        this.bgm.play();
      }
    } else {
      this.bgm = this.sound.add('basic_bgm', { loop: true, volume: 0.4 });
      this.bgm.play();
    }
    this.sound.once('unlocked', () => {
      if (this.bgm && !this.bgm.isPlaying) {
        this.bgm.play();
      }
    });
  }

  // ----------------------------------------------------------
  _buildLevel() {
    // Ground slabs
    const groundY = GAME_H - 32; // top of ground row
    // Main ground – leave a few pits
    const groundSegments = [
      [0,    800],
      [900,  1600],
      [1700, 2200],
      [2300, 3200],
    ];
    groundSegments.forEach(([start, end]) => {
      for (let x = start; x < end; x += 64) {
        const tile = this.platforms.create(x + 32, groundY, 'tiles', 'terrain_grass_block');
        tile.refreshBody();
      }
    });

    // Floating platforms
    const plats = [
      [200, 440, 4], [400, 380, 3], [600, 320, 3],
      [800, 400, 4], [1000, 340, 3],[1200, 280, 4],
      [1400, 360, 3],[1500, 290, 3],[1700, 380, 4],
      [1900, 310, 3],[2050, 250, 4],[2200, 380, 3],
      [2400, 300, 4],[2550, 240, 3],[2700, 340, 3],
      [2900, 380, 4],[3000, 310, 3],[3100, 260, 2],
    ];
    plats.forEach(([x, y, tiles]) => {
      for (let i = 0; i < tiles; i++) {
        let frameName = 'terrain_grass_horizontal_middle';
        if (i === 0) frameName = 'terrain_grass_horizontal_left';
        else if (i === tiles - 1) frameName = 'terrain_grass_horizontal_right';
        
        const t = this.platforms.create(x + i * 64 + 32, y, 'tiles', frameName);
        t.refreshBody();
      }
    });

    // Star boxes
    const boxes = [
      [250, 380], [450, 310], [650, 250], [900, 330], [1050, 270],
      [1300, 210], [1600, 220], [1800, 310], [2100, 180], [2450, 230],
      [2650, 170], [2950, 310],
    ];
    boxes.forEach(([x, y]) => {
      const b = this.starBoxes.create(x, y, 'tiles', 'block_coin');
      b.refreshBody();
      b.setData('hit', false);
    });

    // Enemies – raw potatoes (Snail)
    const potatoXs = [350, 750, 1100, 1450, 1750, 2000, 2350, 2650, 2950];
    potatoXs.forEach(x => {
      const e = this.enemies.create(x, GAME_H - 64, 'enemies', 'snail_walk_a');
      e.setData('type', 'potato');
      e.setData('dir', 1);
      e.body.setSize(44, 40);
      e.body.setOffset(10, 24);
      e.setVelocityX(60);
      e.anims.play('snail_walk');
    });

    // Thorny pumpkins (Spike Slime)
    const pumpkinXs = [500, 1200, 1900, 2500, 2800];
    pumpkinXs.forEach(x => {
      const p = this.pumpkins.create(x, GAME_H - 64, 'enemies', 'slime_spike_rest');
      p.body.setSize(48, 30);
      p.body.setOffset(8, 34);
      p.refreshBody();
    });

    // Stars scattered on platforms
    const starPositions = [
      [220, 420],[260,420],[300,420],
      [820,380],[860,380],
      [1220,260],[1260,260],
      [1920,290],[1960,290],[2000,290],
      [2420,280],[2460,280],
    ];
    starPositions.forEach(([x,y]) => {
      const s = this.stars.create(x, y, 'tiles', 'star');
      s.setBounceY(0.3);
      s.body.setAllowGravity(true);
    });
  }

  // ----------------------------------------------------------
  _buildHUD() {
    const cam = this.cameras.main;

    // Background panel
    this.hudBg = this.add.rectangle(0, 0, 260, 72, 0x000000, 0.55)
      .setOrigin(0, 0).setScrollFactor(0).setDepth(100);

    // Name label
    this.nameText = this.add.text(10, 6, '1P 실세아', {
      fontSize: '14px', fill: '#ffd700', fontFamily: 'sans-serif', fontStyle: 'bold'
    }).setScrollFactor(0).setDepth(101);

    // Hearts
    this.heartImages = [];
    for (let i = 0; i < 3; i++) {
      const h = this.add.image(12 + i * 26, 30, 'tiles', 'hud_heart')
        .setScrollFactor(0).setDepth(101).setOrigin(0, 0);
      this.heartImages.push(h);
    }

    // Score
    this.scoreText = this.add.text(10, 52, 'Score: 0%', {
      fontSize: '13px', fill: '#ffffff', fontFamily: 'sans-serif'
    }).setScrollFactor(0).setDepth(101);

    // State label
    this.stateText = this.add.text(GAME_W - 10, 6, '●  일반', {
      fontSize: '13px', fill: '#ffffff', fontFamily: 'sans-serif', align: 'right'
    }).setOrigin(1, 0).setScrollFactor(0).setDepth(101);

    // Flight gauge (only shown in Pegasus / Alicorn)
    this.gaugeBg = this.add.rectangle(10, 74, 160, 14, 0x222222, 0.8)
      .setOrigin(0, 0).setScrollFactor(0).setDepth(100).setVisible(false);
    this.gaugeBar = this.add.rectangle(10, 74, 160, 14, 0x00ccff, 0.9)
      .setOrigin(0, 0).setScrollFactor(0).setDepth(101).setVisible(false);
    this.gaugeLabel = this.add.text(10, 90, '비행 게이지', {
      fontSize: '11px', fill: '#00ccff', fontFamily: 'sans-serif'
    }).setScrollFactor(0).setDepth(101).setVisible(false);

    // Boss HP bar (hidden initially)
    this.bossHpBg = this.add.rectangle(GAME_W / 2, GAME_H - 20, 300, 18, 0x330000, 0.9)
      .setOrigin(0.5, 0.5).setScrollFactor(0).setDepth(100).setVisible(false);
    this.bossHpBar = this.add.rectangle(GAME_W / 2 - 149, GAME_H - 20, 298, 14, 0xff2200, 0.9)
      .setOrigin(0, 0.5).setScrollFactor(0).setDepth(101).setVisible(false);
    this.bossHpText = this.add.text(GAME_W / 2, GAME_H - 20, '100% 완전히 타버린 감자 대왕', {
      fontSize: '11px', fill: '#ffaa00', fontFamily: 'sans-serif'
    }).setOrigin(0.5, 0.5).setScrollFactor(0).setDepth(102).setVisible(false);

    // Center message (victory / game over)
    this.centerMsg = this.add.text(GAME_W / 2, GAME_H / 2, '', {
      fontSize: '22px', fill: '#ffd700',
      fontFamily: 'sans-serif', fontStyle: 'bold',
      stroke: '#000000', strokeThickness: 6,
      align: 'center', wordWrap: { width: 700 }
    }).setOrigin(0.5, 0.5).setScrollFactor(0).setDepth(200).setVisible(false);

    this._refreshHUD();
  }

  // ----------------------------------------------------------
  _refreshHUD() {
    // Hearts
    for (let i = 0; i < 3; i++) {
      this.heartImages[i].setFrame(i < this.playerHP ? 'hud_heart' : 'hud_heart_empty');
    }
    // Score
    this.scoreText.setText(`Score: ${this.score}%`);

    // State label
    const stateNames = ['일반', '유니콘', '페가수스', '알리콘'];
    const stateColHex = ['#ffffff', '#4488ff', '#00ccff', '#ffd700'];
    this.stateText.setText(`● ${stateNames[this.playerState]}`);
    this.stateText.setColor(stateColHex[this.playerState]);

    // Flight gauge visibility
    const showGauge = (this.playerState === STATE.PEGASUS || this.playerState === STATE.ALICORN);
    this.gaugeBg.setVisible(showGauge);
    this.gaugeBar.setVisible(showGauge);
    this.gaugeLabel.setVisible(showGauge);

    if (showGauge) {
      const ratio = this.playerState === STATE.ALICORN ? 1 : (this.flightGauge / 8);
      this.gaugeBar.setDisplaySize(Math.max(0, 160 * ratio), 14);
      if (this.playerState === STATE.ALICORN) {
        this.gaugeBar.setFillStyle(0xffd700);
        this.gaugeLabel.setText('비행 게이지 (무한)');
      } else {
        this.gaugeBar.setFillStyle(0x00ccff);
        this.gaugeLabel.setText('비행 게이지');
      }
    }

    // Apply tint based on state (keep silsea_sprite_clean texture)
    if (this.playerState === STATE.NORMAL) {
      this.player.clearTint();
    } else {
      this.player.setTint(STATE_COLOR[this.playerState]);
    }

    // Player tint flash if invincible
    if (this.isInvincible) {
      this.player.setAlpha(0.5 + Math.sin(Date.now() * 0.03) * 0.5);
    } else {
      this.player.setAlpha(1);
    }
  }

  // ----------------------------------------------------------
  _hitStarBox(player, box) {
    // Only trigger when hitting from below
    if (box.getData('hit')) return;
    if (player.body.velocity.y >= 0) return; // only upward
    if (player.y > box.y) {
      box.setData('hit', true);
      box.setFrame('block_coin_active');
      this.sound.play('sfx_bump', { volume: 0.5 });

      // Animate box bump
      this.tweens.add({
        targets: box, y: box.y - 8, duration: 80,
        yoyo: true, ease: 'Sine.easeOut'
      });

      // Drop item or star
      this._dropFromBox(box.x, box.y);
    }
  }

  _dropFromBox(x, y) {
    const roll = Math.random();
    let key, type;

    if (roll < 0.10) {          // 10% – Rainbow Wings (Alicorn)
      key = 'gem_red'; type = 'rainbow';
    } else if (roll < 0.30) {   // 20% – Wings (Pegasus)
      key = 'gem_green'; type = 'wings';
    } else if (roll < 0.50) {   // 20% – Horn (Unicorn)
      key = 'gem_blue'; type = 'horn';
    } else {                    // 50% – 3 stars
      this.sound.play('sfx_gem', { volume: 0.4 });
      for (let i = 0; i < 3; i++) {
        const s = this.stars.create(x + (i - 1) * 18, y - 20, 'tiles', 'star');
        s.setVelocityY(-180);
        s.setBounceY(0.4);
        s.body.setAllowGravity(true);
      }
      return;
    }

    this.sound.play('sfx_gem', { volume: 0.5 });
    const item = this.items.create(x, y - 20, 'tiles', key);
    item.setData('type', type);
    item.setVelocityY(-200);
    item.setBounceY(0.3);
  }

  // ----------------------------------------------------------
  _collectStar(player, star) {
    star.destroy();
    this.score += 7;
    this._refreshHUD();
    this.sound.play('sfx_coin', { volume: 0.5 });
    this._floatText(star.x, star.y, '+7%', '#ffee00');
  }

  _collectItem(player, item) {
    const type = item.getData('type');
    item.destroy();
    this.sound.play('sfx_magic', { volume: 0.6 });

    switch (type) {
      case 'horn':    this._setState(STATE.UNICORN);  break;
      case 'wings':   this._setState(STATE.PEGASUS);  break;
      case 'rainbow': this._setState(STATE.ALICORN);  break;
    }
  }

  _setState(newState) {
    this.playerState = newState;
    if (newState === STATE.PEGASUS) {
      // Don't reset gauge if already pegasus
      if (this.flightGauge <= 0) this.flightGauge = 8;
    }
    if (newState === STATE.ALICORN) {
      this.flightGauge = 8;
    }
    this._refreshHUD();
    // Flash effect
    this.cameras.main.flash(200, 150, 150, 255);
  }

  // ----------------------------------------------------------
  // Enemy interactions
  _hitEnemy(player, enemy) {
    if (this.isInvincible || this.gameOver) return;
    if (enemy.getData('type') !== 'potato') return;

    // Stomp: player falling onto enemy head
    const playerBottom = player.y + player.height / 2;
    const enemyTop     = enemy.y  - enemy.height / 2;

    if (player.body.velocity.y > 0 && playerBottom < enemy.y + 10) {
      // Stomp success
      enemy.destroy();
      this.sound.play('sfx_disappear', { volume: 0.6 });
      player.setVelocityY(-300);
      this.score += 7;
      this._refreshHUD();
      this._floatText(enemy.x, enemy.y, 'STOMP! +7%', '#ff8800');
    } else {
      // Alicorn: invincible
      if (this.playerState === STATE.ALICORN) {
        enemy.destroy();
        this.sound.play('sfx_disappear', { volume: 0.6 });
        this._floatText(enemy.x, enemy.y, '알리콘 격파!', '#ffd700');
        return;
      }
      this._takeDamage(player);
    }
  }

  _hitPumpkin(player, pumpkin) {
    if (this.isInvincible || this.gameOver) return;

    // Unicorn/Alicorn dash-destroy (not stomping from above)
    const playerBottom = player.y + player.height / 2;
    if ((this.playerState === STATE.UNICORN || this.playerState === STATE.ALICORN)
        && playerBottom > pumpkin.y - pumpkin.height / 2 + 4) {
      pumpkin.destroy();
      this.sound.play('sfx_disappear', { volume: 0.6 });
      this._floatText(pumpkin.x, pumpkin.y, '대시 격파!', '#4488ff');
      return;
    }

    this._takeDamage(player);
  }

  _hitLightning(player, lightning) {
    if (this.isInvincible || this.gameOver) return;
    if (this.playerState === STATE.ALICORN) { lightning.destroy(); return; }
    lightning.destroy();
    this._takeDamage(player);
  }

  _hitMagpie(player, magpie) {
    if (this.gameOver) return;
    const playerBottom = player.y + player.height / 2;
    const magpieTop    = magpie.y - magpie.height / 2;

    // Stomp magpie
    if (player.body.velocity.y > 0 && playerBottom < magpie.y + 10) {
      magpie.destroy();
      this.sound.play('sfx_disappear', { volume: 0.6 });
      player.setVelocityY(-260);
      this._floatText(magpie.x, magpie.y, '까치 격파!', '#88ff00');
      return;
    }

    // Alicorn destroys it
    if (this.playerState === STATE.ALICORN) {
      magpie.destroy();
      this.sound.play('sfx_disappear', { volume: 0.6 });
      return;
    }

    // Percent theft – no HP damage
    if (!magpie.getData('stealing')) {
      magpie.setData('stealing', true);
      this.score = Math.max(0, this.score - 100);
      this._refreshHUD();
      this._floatText(magpie.x, magpie.y - 20, '-100%!!', '#ff2200');
      // magpie flies away after stealing
      this.time.delayedCall(400, () => {
        if (magpie && magpie.active) {
          magpie.setVelocity(200, -300);
          this.time.delayedCall(1000, () => { if (magpie.active) magpie.destroy(); });
        }
      });
    }
  }

  _hitBossProj(player, proj) {
    if (this.isInvincible || this.gameOver) return;
    if (this.playerState === STATE.ALICORN) { proj.destroy(); return; }
    proj.destroy();
    this._takeDamage(player);
  }

  // ----------------------------------------------------------
  _takeDamage(player) {
    if (this.isInvincible) return;

    this.sound.play('sfx_hurt', { volume: 0.7 });

    // Revert state (unless already Normal, Alicorn invincible handled above)
    if (this.playerState !== STATE.NORMAL) {
      this._setState(STATE.NORMAL);
      // Brief immunity after losing state
      this._grantInvincibility(1000);
      return;
    }

    this.playerHP--;
    this._refreshHUD();
    this.cameras.main.shake(200, 0.015);
    this.cameras.main.flash(150, 255, 0, 0);

    if (this.playerHP <= 0) {
      this._doGameOver();
    } else {
      this._grantInvincibility(1500);
    }
  }

  _grantInvincibility(ms) {
    this.isInvincible = true;
    this.time.delayedCall(ms, () => {
      this.isInvincible = false;
      this.player.setAlpha(1);
    });
  }

  // ----------------------------------------------------------
  _doGameOver() {
    this.gameOver = true;
    this.physics.pause();
    this.centerMsg.setText('게임 오버\n\n다시 도전해보세요!');
    this.centerMsg.setColor('#ff4444');
    this.centerMsg.setVisible(true);

    // Restart on any key
    this.time.delayedCall(2000, () => {
      this.input.keyboard.once('keydown', () => this.scene.restart());
    });
  }

  // ----------------------------------------------------------
  _doVictory() {
    this.gameWon = true;
    this.score += 1000;
    this._refreshHUD();

    // Spawn rainbow gate
    const gate = this.add.image(2850, GAME_H - 120, 'gate');
    gate.setDepth(10);

    this.physics.pause();
    this.centerMsg.setText(
      `최종 스코어: ${this.score}% 달성!\n스테이지 클리어!`
    );
    this.centerMsg.setColor('#ffd700');
    this.centerMsg.setFontSize('28px');
    this.centerMsg.setVisible(true);

    this.tweens.add({
      targets: this.centerMsg,
      scaleX: 1.08, scaleY: 1.08,
      duration: 600, yoyo: true, repeat: -1,
      ease: 'Sine.easeInOut'
    });

    // Touch gate to show message (already shown above)
  }

  // ----------------------------------------------------------
  _floatText(x, y, msg, color) {
    const t = this.add.text(x, y, msg, {
      fontSize: '14px', fill: color || '#ffffff',
      fontFamily: 'sans-serif', fontStyle: 'bold',
      stroke: '#000000', strokeThickness: 4
    }).setDepth(150);
    this.tweens.add({
      targets: t, y: y - 50, alpha: 0, duration: 900,
      ease: 'Cubic.easeOut',
      onComplete: () => t.destroy()
    });
  }

  // ----------------------------------------------------------
  _spawnCloud() {
    if (this.gameOver || this.gameWon) return;
    const x = this.player.x + Phaser.Math.Between(300, 700);
    if (x > WORLD_WIDTH - 100 || x < 100) return;
    const y = Phaser.Math.Between(60, 220);
    const c = this.clouds.create(x, y, 'cloud');
    c.setData('type', 'cloud');
    c.body.setAllowGravity(false);
    c.setVelocityX(-20);
    c.setData('shootTimer', 0);
    // Lightning interval
    c.setData('lightningDelay', Phaser.Math.Between(3000, 6000));
    this.time.addEvent({
      delay: c.getData('lightningDelay'),
      callback: () => { if (c.active) this._shootLightning(c); },
      callbackScope: this,
      loop: true
    });
  }

  _shootLightning(cloud) {
    if (!cloud.active || this.gameOver || this.gameWon) return;
    const l = this.lightnings.create(cloud.x, cloud.y + 20, 'lightning');
    l.setVelocityY(300);
    l.body.setAllowGravity(false);
    this.sound.play('sfx_throw', { volume: 0.3 });
    this.time.delayedCall(2000, () => { if (l.active) l.destroy(); });
  }

  // ----------------------------------------------------------
  _spawnMagpie() {
    if (this.gameOver || this.gameWon) return;
    const x = this.player.x + Phaser.Math.Between(300, 500) * (Math.random() < 0.5 ? 1 : -1);
    if (x < 50 || x > WORLD_WIDTH - 50) return;
    const m = this.magpies.create(
      Phaser.Math.Clamp(x, 50, WORLD_WIDTH - 50),
      Phaser.Math.Between(60, 180),
      'enemies', 'bee_a'
    );
    m.body.setAllowGravity(false);
    m.setData('diving', false);
    m.setData('diveTimer', Phaser.Math.Between(2000, 4000));
    m.anims.play('bee_fly');
  }

  // ----------------------------------------------------------
  // BOSS
  _spawnBoss() {
    this.bossSpawned = true;
    this.boss = this.physics.add.sprite(2900, GAME_H - 100, 'enemies', 'slime_block_walk_a');
    this.boss.setScale(2.5);
    this.boss.body.setSize(50, 40);
    this.boss.body.setOffset(7, 24);
    this.boss.setTint(0x333333); // burnt look!
    this.boss.setCollideWorldBounds(true);
    this.physics.add.collider(this.boss, this.platforms);
    this.boss.anims.play('boss_walk');

    // Boss HP bar visible
    this.bossHpBg.setVisible(true);
    this.bossHpBar.setVisible(true);
    this.bossHpText.setVisible(true);

    // Boss overlap: stomp to damage
    this.physics.add.overlap(this.player, this.boss, this._hitBoss, null, this);

    // Boss AI timer
    this.bossAttackTimer = this.time.addEvent({
      delay: 2000, callback: this._bossAI, callbackScope: this, loop: true
    });
  }

  _hitBoss(player, boss) {
    if (!boss.active || this.gameOver || this.gameWon) return;
    const playerBottom = player.y + player.height / 2;

    if (player.body.velocity.y > 0 && playerBottom < boss.y) {
      // Stomp boss
      if (this.isInvincible) return; // still counts but no double stun
      this.bossHP--;
      this.sound.play('sfx_disappear', { volume: 0.7 });
      player.setVelocityY(-320);
      this._grantInvincibility(600);
      this._floatText(boss.x, boss.y - 50, `STOMP! (${this.bossHP} HP left)`, '#ff8800');
      this._updateBossHpBar();
      this.cameras.main.shake(150, 0.01);

      if (this.bossHP <= 0) {
        this._defeatBoss();
      }
    } else {
      // Boss damages player
      if (this.playerState === STATE.ALICORN) return;
      this._takeDamage(player);
    }
  }

  _updateBossHpBar() {
    const ratio = this.bossHP / 3;
    this.bossHpBar.setDisplaySize(Math.max(0, 298 * ratio), 14);
  }

  _bossAI() {
    if (!this.boss || !this.boss.active || this.gameOver || this.gameWon) return;

    const roll = Math.random();
    if (roll < 0.5) {
      this._bossQuake();
    } else {
      this._bossShoot();
    }
  }

  _bossQuake() {
    // Jump and slam
    this.boss.setVelocityY(-400);
    this.sound.play('sfx_throw', { volume: 0.4 });
    this.time.delayedCall(600, () => {
      if (!this.boss || !this.boss.active) return;
      this.cameras.main.shake(300, 0.02);
      // Stun player if on ground
      if (this.player.body.blocked.down) {
        this.isStunned = true;
        this.player.setVelocity(0, 0);
        this._floatText(this.player.x, this.player.y - 30, '기절!', '#ffaaaa');
        this.time.delayedCall(1000, () => { this.isStunned = false; });
      }
    });
  }

  _bossShoot() {
    if (!this.boss || !this.boss.active) return;
    const dirX = this.player.x < this.boss.x ? -1 : 1;
    const proj = this.bossProjs.create(this.boss.x, this.boss.y, 'boss_proj');
    proj.body.setAllowGravity(false);
    proj.setVelocityX(dirX * 280);
    this.sound.play('sfx_throw', { volume: 0.4 });
    this.time.delayedCall(3000, () => { if (proj.active) proj.destroy(); });
  }

  _defeatBoss() {
    this.boss.destroy();
    if (this.bossAttackTimer) this.bossAttackTimer.destroy();
    this.bossHpBg.setVisible(false);
    this.bossHpBar.setVisible(false);
    this.bossHpText.setVisible(false);
    this._doVictory();
  }

  // ----------------------------------------------------------
  update(time, delta) {
    if (this.gameOver || this.gameWon) return;

    const dt = delta / 1000; // seconds
    const onGround = this.player.body.blocked.down;

    // ---- Fell into pit ----
    if (this.player.y > GAME_H + 50) {
      this._doGameOver();
      return;
    }

    // ---- Spawn boss when player approaches ----
    if (!this.bossSpawned && this.player.x > 2600) {
      this._spawnBoss();
    }

    // ---- Player movement & animations ----
    if (!this.isStunned) {
      if (this.cursors.left.isDown) {
        this.player.setVelocityX(-180);
        this.player.setFlipX(true);
        if (onGround) {
          this.player.anims.play('run', true);
        }
      } else if (this.cursors.right.isDown) {
        this.player.setVelocityX(180);
        this.player.setFlipX(false);
        if (onGround) {
          this.player.anims.play('run', true);
        }
      } else {
        this.player.setVelocityX(0);
        if (onGround) {
          this.player.anims.play('idle', true);
        }
      }
    } else {
      if (onGround) {
        this.player.anims.play('idle', true);
      }
    }

    // ---- Jump / Flight ----
    const jumpPressed = Phaser.Input.Keyboard.JustDown(this.cursors.up)
                     || Phaser.Input.Keyboard.JustDown(this.spaceKey);
    const jumpHeld    = this.cursors.up.isDown || this.spaceKey.isDown;

    if (jumpPressed && onGround) {
      this.player.setVelocityY(-480);
      this.sound.play('sfx_jump', { volume: 0.5 });
    }

    if (!onGround) {
      this.player.anims.play('jump', true);
    }

    // Pegasus flight
    if (this.playerState === STATE.PEGASUS || this.playerState === STATE.ALICORN) {
      const infinite = this.playerState === STATE.ALICORN;

      if (jumpHeld && !onGround) {
        if (infinite || this.flightGauge > 0) {
          this.isFlying = true;
          if (!infinite) {
            this.flightGauge = Math.max(0, this.flightGauge - dt);
          }
          // Override gravity with upward force
          const vy = this.player.body.velocity.y;
          if (vy > -150) {
            this.player.setVelocityY(Math.max(-150, vy - 600 * dt));
          }
        }
      } else {
        this.isFlying = false;
      }

      // Gauge regen on ground
      if (onGround && !infinite) {
        this.flightGauge = Math.min(8, this.flightGauge + dt * 1.2);
      }
    }

    // ---- Unicorn / Alicorn magnet effect ----
    if (this.playerState === STATE.UNICORN || this.playerState === STATE.ALICORN) {
      this.stars.getChildren().forEach(star => {
        if (!star.active) return;
        const dist = Phaser.Math.Distance.Between(
          this.player.x, this.player.y, star.x, star.y
        );
        if (dist < 200) {
          const angle = Phaser.Math.Angle.Between(star.x, star.y, this.player.x, this.player.y);
          const speed = Phaser.Math.Linear(300, 80, dist / 200);
          star.setVelocity(Math.cos(angle) * speed, Math.sin(angle) * speed);
        }
      });
    }

    // ---- Magpie AI ----
    this.magpies.getChildren().forEach(magpie => {
      if (!magpie.active) return;
      const dist = Phaser.Math.Distance.Between(
        this.player.x, this.player.y, magpie.x, magpie.y
      );

      if (!magpie.getData('diving') && dist < 350) {
        magpie.setData('diving', true);
        const angle = Phaser.Math.Angle.Between(magpie.x, magpie.y, this.player.x, this.player.y);
        magpie.setVelocity(Math.cos(angle) * 220, Math.sin(angle) * 220);
        this.time.delayedCall(1500, () => {
          if (magpie.active) {
            magpie.setData('diving', false);
            magpie.setVelocity(Phaser.Math.Between(-50, 50), -100);
          }
        });
      }
    });

    // ---- Raw potato patrol ----
    this.enemies.getChildren().forEach(enemy => {
      if (!enemy.active || enemy.getData('type') !== 'potato') return;
      // Reverse at world limits or near pits (simple: reverse at x limits)
      if (enemy.x < 20 || enemy.x > WORLD_WIDTH - 20
          || enemy.body.blocked.right || enemy.body.blocked.left) {
        const dir = enemy.getData('dir') * -1;
        enemy.setData('dir', dir);
        enemy.setVelocityX(dir * 60);
        enemy.setFlipX(dir < 0);
      }
    });

    // ---- Boss movement (patrol between x=2750 and x=3100) ----
    if (this.boss && this.boss.active) {
      if (this.boss.x < 2750) {
        this.boss.setVelocityX(80);
        this.boss.setFlipX(false);
      } else if (this.boss.x > 3100) {
        this.boss.setVelocityX(-80);
        this.boss.setFlipX(true);
      }
    }

    // ---- HUD refresh ----
    this._refreshHUD();
  }
}

// ============================================================
// GAME CONFIG & LAUNCH
// ============================================================
const config = {
  type: Phaser.AUTO,
  backgroundColor: '#1a1a3a',
  parent: 'game-container',
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width: GAME_W,
    height: GAME_H
  },
  physics: {
    default: 'arcade',
    arcade: {
      gravity: { y: 700 },
      debug: false
    }
  },
  scene: [BootScene, GameScene]
};

const game = new Phaser.Game(config);
</script>
